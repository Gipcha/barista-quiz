<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barista Certification Quiz</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
</head>
<body>
            <h1>Аттестационный тест бариста</h1>
    <div class="quiz-container">


        <p id="start-paragraph">Ответьте на 10 вопросов о кофе, экстракции и работе бариста.</p>

        <button id="start-btn">Начать тест</button>

        <div id="question" class="hidden"> </div>
        <div id="answers" class="hidden"> </div>
        <div id="feedback" class="hidden"></div>
        <div id="timer" class="hidden"></div>
        <div id="result" class="hidden"> </div>



        <button id="restart-btn" class="hidden">Перезапустить тест</button>
    </div>

        <script src="script.js"></script>
</body>
</html>
